openapi: "3.0.3"
info:
  title: Iris — Threat Intelligence Aggregation & IOC Platform
  description: Aggregates threat intelligence from OTX, URLhaus, PhishTank. Deduplicates IOCs, scores confidence, generates alerts.
  version: 1.0.0
  contact:
    name: makhembu
    url: https://github.com/makhembu/iris

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status with IOC count and uptime
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  iocs: { type: integer }
                  uptime: { type: number }

  /iocs:
    get:
      summary: Query IOCs
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [ip, domain, url, hash, email] }
        - name: severity
          in: query
          schema: { type: string, enum: [low, medium, high, critical] }
        - name: source
          in: query
          schema: { type: string, enum: [alienvault, urlhaus, phishtank, abusech, talos, manual] }
        - name: minConfidence
          in: query
          schema: { type: number, minimum: 0, maximum: 1 }
        - name: q
          in: query
          schema: { type: string }
          description: Search value or description
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated IOC list with total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  iocs: { type: array, items: { $ref: "#/components/schemas/IOC" } }
                  total: { type: integer }
                  query: { type: object }

  /iocs/{id}:
    get:
      summary: Get single IOC
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: IOC object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IOC"
        "404":
          description: IOC not found

  /stats:
    get:
      summary: Dashboard statistics
      responses:
        "200":
          description: Aggregated stats including counts by type, severity, source, top confidence IOCs, feed status, recent alerts

  /feeds:
    get:
      summary: Feed status list
      responses:
        "200":
          description: List of feed sources with status

  /feeds/ingest:
    post:
      summary: Trigger feed ingestion
      responses:
        "200":
          description: Ingestion results per feed source

  /alerts:
    get:
      summary: List alerts
      parameters:
        - name: acknowledged
          in: query
          schema: { type: string, enum: [true, false] }
      responses:
        "200":
          description: List of alerts

  /alerts/{id}/acknowledge:
    post:
      summary: Acknowledge an alert
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Alert acknowledged

components:
  schemas:
    IOC:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        value: { type: string }
        severity: { type: string }
        confidence: { type: number }
        source: { type: string }
        description: { type: string }
        tags: { type: string }
        first_seen: { type: string }
        last_seen: { type: string }
